services:
  # === AI Agent Services ===

  openclaw-emma:
    image: openclaw/openclaw:latest
    container_name: openclaw-emma
    restart: unless-stopped
    environment:
      - OPENCLAW_AGENT_NAME=Emma
      - OPENCLAW_ROLE=project-lead
      - OPENCLAW_MODEL=${EMMA_MODEL:-qwen3-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen-2.5-coder-32b}
      - OPENCLAW_API_BASE=https://api.groq.com/openai/v1
      - OPENCLAW_API_KEY=${GROQ_API_KEY}
      - SLACK_BOT_TOKEN=${EMMA_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${EMMA_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${EMMA_BITBUCKET_USERNAME}
      - BITBUCKET_APP_PASSWORD=${EMMA_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
    volumes:
      - emma-memory:/app/memory
      - ./agents/emma/IDENTITY.md:/app/IDENTITY.md:ro
      - ./agents/emma/BRAIN.md:/app/BRAIN.md:ro
      - ./agents/emma/WORKFLOWS.md:/app/WORKFLOWS.md:ro
    networks:
      - ai-team-net

  openclaw-morgan:
    image: openclaw/openclaw:latest
    container_name: openclaw-morgan
    restart: unless-stopped
    environment:
      - OPENCLAW_AGENT_NAME=Morgan
      - OPENCLAW_ROLE=architect
      - OPENCLAW_MODEL=${MORGAN_MODEL:-qwen3-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen-2.5-coder-32b}
      - OPENCLAW_API_BASE=https://api.groq.com/openai/v1
      - OPENCLAW_API_KEY=${GROQ_API_KEY}
      - SLACK_BOT_TOKEN=${MORGAN_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${MORGAN_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${MORGAN_BITBUCKET_USERNAME}
      - BITBUCKET_APP_PASSWORD=${MORGAN_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
    volumes:
      - morgan-memory:/app/memory
      - ./agents/morgan/IDENTITY.md:/app/IDENTITY.md:ro
      - ./agents/morgan/BRAIN.md:/app/BRAIN.md:ro
      - ./agents/morgan/WORKFLOWS.md:/app/WORKFLOWS.md:ro
    networks:
      - ai-team-net

  openclaw-sean:
    image: openclaw/openclaw:latest
    container_name: openclaw-sean
    restart: unless-stopped
    environment:
      - OPENCLAW_AGENT_NAME=Sean
      - OPENCLAW_ROLE=developer-qa
      - OPENCLAW_MODEL=${SEAN_MODEL:-qwen-2.5-coder-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen3-32b}
      - OPENCLAW_API_BASE=https://api.groq.com/openai/v1
      - OPENCLAW_API_KEY=${GROQ_API_KEY}
      - SLACK_BOT_TOKEN=${SEAN_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SEAN_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${SEAN_BITBUCKET_USERNAME}
      - BITBUCKET_APP_PASSWORD=${SEAN_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
    volumes:
      - sean-memory:/app/memory
      - ./agents/sean/IDENTITY.md:/app/IDENTITY.md:ro
      - ./agents/sean/BRAIN.md:/app/BRAIN.md:ro
      - ./agents/sean/WORKFLOWS.md:/app/WORKFLOWS.md:ro
    networks:
      - ai-team-net

  # === Shared Services ===

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - portainer-data:/data
    networks:
      - ai-team-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - ai-team-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ai-team-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ai-team-net
    depends_on:
      - loki

networks:
  ai-team-net:
    driver: bridge

volumes:
  emma-memory:
  morgan-memory:
  sean-memory:
  portainer-data:
  loki-data:
  grafana-data:
