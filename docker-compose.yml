services:
  # === AI Agent Services ===

  openclaw-emma-init:
    image: alpine/openclaw:latest
    container_name: openclaw-emma-init
    user: root
    entrypoint: sh
    command: -c "/tmp/scripts/agent-init.sh 'Emma (AI Lead)' 'emmaailead@proton.me'"
    volumes:
      - emma-state:/home/node/.openclaw
      - emma-memory:/app/memory
      - ./agents/emma/IDENTITY.md:/tmp/agent/IDENTITY.md:ro
      - ./agents/emma/BRAIN.md:/tmp/agent/BRAIN.md:ro
      - ./agents/emma/WORKFLOWS.md:/tmp/agent/WORKFLOWS.md:ro
      - ./scripts/agent-init.sh:/tmp/scripts/agent-init.sh:ro
      - ./scripts/redis-msg.mjs:/tmp/scripts/redis-msg.mjs:ro

  openclaw-emma:
    image: alpine/openclaw:latest
    container_name: openclaw-emma
    restart: unless-stopped
    depends_on:
      openclaw-emma-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    entrypoint: ["/tmp/scripts/agent-entrypoint.sh", "docker-entrypoint.sh"]
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    environment:
      - OPENCLAW_AGENT_NAME=Emma
      - OPENCLAW_ROLE=project-lead
      - OPENCLAW_MODEL=${EMMA_MODEL:-qwen3-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen-2.5-coder-32b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_BOT_TOKEN=${EMMA_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${EMMA_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${EMMA_BITBUCKET_USERNAME}
      - BITBUCKET_GIT_USERNAME=${EMMA_BITBUCKET_GIT_USERNAME}
      - BITBUCKET_APP_PASSWORD=${EMMA_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
      - REDIS_HOST=redis
      - GIT_CONFIG_GLOBAL=/home/node/.openclaw/.gitconfig
      - PATH=/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - emma-state:/home/node/.openclaw
      - emma-memory:/app/memory
      - ./scripts/agent-entrypoint.sh:/tmp/scripts/agent-entrypoint.sh:ro
    networks:
      - ai-team-net

  openclaw-morgan-init:
    image: alpine/openclaw:latest
    container_name: openclaw-morgan-init
    user: root
    entrypoint: sh
    command: -c "/tmp/scripts/agent-init.sh 'Morgan (Architect)' 'morganaiarch@proton.me'"
    volumes:
      - morgan-state:/home/node/.openclaw
      - morgan-memory:/app/memory
      - ./agents/morgan/IDENTITY.md:/tmp/agent/IDENTITY.md:ro
      - ./agents/morgan/BRAIN.md:/tmp/agent/BRAIN.md:ro
      - ./agents/morgan/WORKFLOWS.md:/tmp/agent/WORKFLOWS.md:ro
      - ./scripts/agent-init.sh:/tmp/scripts/agent-init.sh:ro
      - ./scripts/redis-msg.mjs:/tmp/scripts/redis-msg.mjs:ro

  openclaw-morgan:
    image: alpine/openclaw:latest
    container_name: openclaw-morgan
    restart: unless-stopped
    depends_on:
      openclaw-morgan-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    entrypoint: ["/tmp/scripts/agent-entrypoint.sh", "docker-entrypoint.sh"]
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    environment:
      - OPENCLAW_AGENT_NAME=Morgan
      - OPENCLAW_ROLE=architect
      - OPENCLAW_MODEL=${MORGAN_MODEL:-qwen3-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen-2.5-coder-32b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_BOT_TOKEN=${MORGAN_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${MORGAN_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${MORGAN_BITBUCKET_USERNAME}
      - BITBUCKET_GIT_USERNAME=${MORGAN_BITBUCKET_GIT_USERNAME}
      - BITBUCKET_APP_PASSWORD=${MORGAN_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
      - REDIS_HOST=redis
      - GIT_CONFIG_GLOBAL=/home/node/.openclaw/.gitconfig
      - PATH=/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - morgan-state:/home/node/.openclaw
      - morgan-memory:/app/memory
      - ./scripts/agent-entrypoint.sh:/tmp/scripts/agent-entrypoint.sh:ro
    networks:
      - ai-team-net

  openclaw-sean-init:
    image: alpine/openclaw:latest
    container_name: openclaw-sean-init
    user: root
    entrypoint: sh
    command: -c "/tmp/scripts/agent-init.sh 'Sean (Developer)' 'seanaidev@proton.me'"
    volumes:
      - sean-state:/home/node/.openclaw
      - sean-memory:/app/memory
      - ./agents/sean/IDENTITY.md:/tmp/agent/IDENTITY.md:ro
      - ./agents/sean/BRAIN.md:/tmp/agent/BRAIN.md:ro
      - ./agents/sean/WORKFLOWS.md:/tmp/agent/WORKFLOWS.md:ro
      - ./scripts/agent-init.sh:/tmp/scripts/agent-init.sh:ro
      - ./scripts/redis-msg.mjs:/tmp/scripts/redis-msg.mjs:ro

  openclaw-sean:
    image: alpine/openclaw:latest
    container_name: openclaw-sean
    restart: unless-stopped
    depends_on:
      openclaw-sean-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    entrypoint: ["/tmp/scripts/agent-entrypoint.sh", "docker-entrypoint.sh"]
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    environment:
      - OPENCLAW_AGENT_NAME=Sean
      - OPENCLAW_ROLE=developer-qa
      - OPENCLAW_MODEL=${SEAN_MODEL:-qwen-2.5-coder-32b}
      - OPENCLAW_FALLBACK_MODEL=${FALLBACK_MODEL:-qwen3-32b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_BOT_TOKEN=${SEAN_SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SEAN_SLACK_APP_TOKEN}
      - BITBUCKET_USERNAME=${SEAN_BITBUCKET_USERNAME}
      - BITBUCKET_GIT_USERNAME=${SEAN_BITBUCKET_GIT_USERNAME}
      - BITBUCKET_APP_PASSWORD=${SEAN_BITBUCKET_APP_PASSWORD}
      - BITBUCKET_WORKSPACE=${BITBUCKET_WORKSPACE}
      - REDIS_HOST=redis
      - GIT_CONFIG_GLOBAL=/home/node/.openclaw/.gitconfig
      - PATH=/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - sean-state:/home/node/.openclaw
      - sean-memory:/app/memory
      - ./scripts/agent-entrypoint.sh:/tmp/scripts/agent-entrypoint.sh:ro
    networks:
      - ai-team-net

  # === Shared Services ===

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ai-team-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - ai-team-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ai-team-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ai-team-net
    depends_on:
      - loki

networks:
  ai-team-net:
    driver: bridge

volumes:
  emma-state:
  emma-memory:
  morgan-state:
  morgan-memory:
  sean-state:
  sean-memory:
  redis-data:
  loki-data:
  grafana-data:
